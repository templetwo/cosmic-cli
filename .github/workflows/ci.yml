name: CI

# Pillar 2: the exactly-once PAUSE-token proof is the required gate. A change
# that breaks the invariant — in code or in the model it is checked against —
# fails the build. Spec/code drift cannot land silently.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  exactly-once-proof:
    name: Token exactly-once (Hypothesis stateful)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      # The build-identity guard runs here too: a version that disagrees with
      # itself must not be taggable with the guard green-but-never-executed.
      - name: Load-bearing proofs — PAUSE-token exactly-once + build identity
        run: pytest tests/test_token_stateful.py tests/test_build_identity.py -q
